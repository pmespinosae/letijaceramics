<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Asistente de Catálogo · Letija Ceramics</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="Logotipo.png" />

  <style>
    :root {
      --ink: #141414;
      --muted: #6a6a6a;
      --beige-deep: #e6e6e2;
      --cream: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .card img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      margin-bottom: 22px;
    }
    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 600;
      font-size: 1.5rem;
      margin-bottom: 8px;
    }
    p.sub {
      color: var(--muted);
      font-size: .95rem;
      margin-bottom: 28px;
    }
    form { display: flex; flex-direction: column; gap: 12px; }
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--beige-deep);
      border-radius: 6px;
      font-size: 1rem;
      font-family: inherit;
      text-align: center;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: var(--ink);
    }
    button {
      width: 100%;
      padding: 14px 16px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity .2s;
    }
    button:hover { opacity: .85; }
    .error {
      color: #b3261e;
      font-size: .88rem;
      min-height: 20px;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="Logotipo.png" alt="Letija Ceramics" />
    <h1>Asistente de Catálogo</h1>
    <p class="sub">Escribe la contraseña para entrar a chatear con el asistente.</p>
    <form id="form-acceso" autocomplete="off">
      <input type="password" id="clave" placeholder="Contraseña" autofocus />
      <button type="submit">Entrar</button>
      <p class="error" id="error"></p>
    </form>
  </div>

  <script>
    // Nota: esta es solo una barrera simple, no seguridad real —
    // cualquiera con conocimientos técnicos podría ver la contraseña en el código.
    var CLAVE_CORRECTA = "JeroyElena.1315";
    var ENLACE_AGENTE = "https://app.relevanceai.com/agents/bcbe5a/880acaf5-cee2-410e-bc99-c02918c99e4c/c6d7faa1-c82f-4ab9-9c98-a033c0ede553/embed-chat?hide_tool_steps=true&hide_file_uploads=false&hide_conversation_list=true&bubble_style=agent&primary_color=%23685FFF&bubble_icon=pd%2Fchat&input_placeholder_text=Escribe+tu+mensaje...&hide_logo=false&hide_description=false";

    document.getElementById('form-acceso').addEventListener('submit', function (e) {
      e.preventDefault();
      var valor = document.getElementById('clave').value;
      if (valor === CLAVE_CORRECTA) {
        window.location.href = ENLACE_AGENTE;
      } else {
        document.getElementById('error').textContent = 'Contraseña incorrecta, intenta de nuevo.';
        document.getElementById('clave').value = '';
        document.getElementById('clave').focus();
      }
    });
  </script>

</body>
</html>
